<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Surfari ABI Navigation Page</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #113322;
        color: #f4fff8;
        min-height: 1800px;
      }

      main {
        padding: 24px;
      }

      #input-target {
        width: 220px;
        height: 32px;
      }

      #scroll-target {
        margin-top: 500px;
        height: 900px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Surfari ABI Navigation Page</h1>
      <input id="input-target" />
      <div id="scroll-target">Scroll target</div>
      <p>This page proves navigation through the C ABI.</p>
    </main>
    <script>
      window.__surfariState = {
        focus: false,
        focusIn: false,
        blur: false,
        move: "",
        click: "",
        scroll: 0,
        key: "",
        colorScheme: matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light",
      };

      window.addEventListener("focus", () => {
        window.__surfariState.focus = true;
      });
      window.addEventListener("focusin", () => {
        window.__surfariState.focusIn = true;
      });
      window.addEventListener("blur", () => {
        window.__surfariState.blur = true;
      });
      window.addEventListener("mousemove", (event) => {
        window.__surfariState.move = `${event.clientX},${event.clientY}`;
      });
      window.addEventListener("click", (event) => {
        window.__surfariState.click = `${event.clientX},${event.clientY},${event.button}`;
      });
      window.addEventListener(
        "wheel",
        (event) => {
          window.__surfariState.scroll += Math.round(event.deltaY);
        },
        { passive: true },
      );
      window.addEventListener("keydown", (event) => {
        window.__surfariState.key += event.key;
      });
      matchMedia("(prefers-color-scheme: dark)").addEventListener("change", (event) => {
        window.__surfariState.colorScheme = event.matches ? "dark" : "light";
      });
    </script>
  </body>
</html>
