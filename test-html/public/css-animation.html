<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; overflow: hidden; background: #111; }
@keyframes spin {
  from { transform: rotate(0deg) }
  to { transform: rotate(360deg) }
}
@keyframes pulse {
  0% { background: #e44 }
  33% { background: #4e4 }
  66% { background: #44e }
  100% { background: #e44 }
}
.box {
  width: 200px;
  height: 200px;
  margin: 100px auto;
  animation: spin 2s linear infinite, pulse 3s linear infinite;
  border-radius: 20px;
}
</style>
</head>
<body>
<div class="box"></div>
</body>
</html>
